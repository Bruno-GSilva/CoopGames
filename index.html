<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Jogos Co-op</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans selection:bg-brand-500 selection:text-white">

    <!-- Navbar -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="bg-brand-500 text-white p-2 rounded-lg">
                        <i data-lucide="gamepad-2" class="w-6 h-6"></i>
                    </div>
                    <h1 class="text-xl font-bold text-slate-900">CoopFinder</h1>
                </div>
                <div class="flex items-center gap-4 text-sm font-medium text-slate-500">
                    <span>Base de Dados</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Header & Filters -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <div>
                <h2 class="text-2xl font-bold text-slate-900">Jogos Cadastrados</h2>
                <p class="text-slate-500 text-sm mt-1">Encontre jogos com suporte a modo cooperativo.</p>
            </div>

            <!-- Controles de Filtro -->
            <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                <div class="relative w-full sm:w-64">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                    </div>
                    <input type="text" id="searchInput" placeholder="Buscar jogo..." 
                        class="block w-full pl-10 pr-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm transition-shadow">
                </div>
                
                <label class="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-lg cursor-pointer hover:bg-slate-50 transition-colors select-none">
                    <input type="checkbox" id="localCoopFilter" class="rounded text-brand-600 focus:ring-brand-500 border-slate-300">
                    <span class="text-sm font-medium text-slate-700">Apenas Co-op Local</span>
                </label>
            </div>
        </div>

        <!-- Grid de Resultados -->
        <div id="gamesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Cards gerados via JS entrarão aqui -->
        </div>

        <!-- Estado Vazio -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-16 text-center">
            <div class="bg-slate-100 p-4 rounded-full mb-4">
                <i data-lucide="ghost" class="w-8 h-8 text-slate-400"></i>
            </div>
            <h3 class="text-lg font-semibold text-slate-900">Nenhum jogo encontrado</h3>
            <p class="text-slate-500 mt-1 max-w-sm">Tente ajustar os seus filtros ou realizar uma busca diferente.</p>
        </div>

    </main>

    <script>
        // Inicializa ícones do Lucide
        lucide.createIcons();

        // Elementos do DOM
        const gamesGrid = document.getElementById('gamesGrid');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const localCoopFilter = document.getElementById('localCoopFilter');

        // Configuração do Supabase (Substitua pelas suas credenciais)
        const supabaseUrl = 'https://eolnubtyeggwludteota.supabase.co';
        const supabaseKey = 'sb_publishable_k5w36DkMHUZ8bx13ihlwVg_6ZA4INCY';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentGamesData = []; // Armazena os dados vindos da base de dados

        // Formatação de Data
        function formatDate(isoString) {
            if (!isoString) return 'N/A';
            const date = new Date(isoString);
            return new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' }).format(date);
        }

        // Renderização dos Cards
        function renderGames(games) {
            gamesGrid.innerHTML = '';

            if (games.length === 0) {
                gamesGrid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            gamesGrid.classList.remove('hidden');
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow overflow-hidden flex flex-col";
                
                // Configuração das Badges
                const coopBadge = game.has_local_coop 
                    ? `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-200">
                        <i data-lucide="users" class="w-3 h-3"></i> Co-op Local
                       </span>`
                    : `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-600 border border-slate-200">
                        <i data-lucide="wifi" class="w-3 h-3"></i> Apenas Online
                       </span>`;

                // Configuração dos Links
                const sourceLink = game.source_url 
                    ? `<a href="${game.source_url}" target="_blank" class="text-brand-600 hover:text-brand-700 p-2 rounded-lg hover:bg-brand-50 transition-colors tooltip" title="Página da Loja">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                       </a>` 
                    : `<span class="text-slate-300 p-2"><i data-lucide="external-link" class="w-4 h-4"></i></span>`;

                const coopLink = game.coop_url 
                    ? `<a href="${game.coop_url}" target="_blank" class="text-purple-600 hover:text-purple-700 p-2 rounded-lg hover:bg-purple-50 transition-colors" title="Info Co-op">
                        <i data-lucide="info" class="w-4 h-4"></i>
                       </a>` 
                    : `<span class="text-slate-300 p-2"><i data-lucide="info" class="w-4 h-4"></i></span>`;

                card.innerHTML = `
                    <div class="p-5 flex-1">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-lg font-bold text-slate-900 leading-tight">${game.game_name}</h3>
                            <div class="text-xs text-slate-400 font-mono bg-slate-50 px-2 py-1 rounded">#${game.id}</div>
                        </div>
                        <div class="mb-4">
                            ${coopBadge}
                        </div>
                    </div>
                    <div class="px-5 py-3 bg-slate-50 border-t border-slate-100 flex items-center justify-between mt-auto">
                        <div class="text-xs text-slate-500">
                            Atualizado: <span class="font-medium">${formatDate(game.data_atualizacao)}</span>
                        </div>
                        <div class="flex gap-1">
                            ${sourceLink}
                            ${coopLink}
                        </div>
                    </div>
                `;
                gamesGrid.appendChild(card);
            });

            // Re-renderiza ícones inseridos dinamicamente
            lucide.createIcons();
        }

        // Função para procurar dados no Supabase
        async function fetchGames() {
            try {
                // Estado de carregamento
                gamesGrid.innerHTML = '<div class="col-span-full text-center py-12 text-slate-500 flex flex-col items-center"><i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-3 text-brand-500"></i>A carregar jogos do Supabase...</div>';
                lucide.createIcons();
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                gamesGrid.classList.remove('hidden');

                const { data, error } = await supabaseClient
                    .from('coop_games')
                    .select('*')
                    .order('game_name', { ascending: true });
                
                if (error) throw error;

                currentGamesData = data || [];
                renderGames(currentGamesData);
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                gamesGrid.innerHTML = `<div class="col-span-full text-center py-10 text-red-600 bg-red-50 rounded-xl border border-red-100 flex flex-col items-center">
                    <i data-lucide="alert-circle" class="w-10 h-10 mb-3 text-red-500"></i>
                    <span class="font-medium">Erro ao carregar os dados.</span>
                    <span class="text-sm mt-1 text-red-400">Verifique a consola e as suas credenciais (URL e KEY) do Supabase.</span>
                </div>`;
                lucide.createIcons();
            }
        }

        // Lógica de Filtro
        function filterData() {
            const searchTerm = searchInput.value.toLowerCase();
            const mustHaveLocalCoop = localCoopFilter.checked;

            const filteredGames = currentGamesData.filter(game => {
                const matchesSearch = game.game_name.toLowerCase().includes(searchTerm);
                const matchesCoop = mustHaveLocalCoop ? game.has_local_coop === true : true;
                return matchesSearch && matchesCoop;
            });

            renderGames(filteredGames);
        }

        // Event Listeners
        searchInput.addEventListener('input', filterData);
        localCoopFilter.addEventListener('change', filterData);

        // Inicialização
        fetchGames();
    </script>
</body>
</html>
