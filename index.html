<script>
  // Error Notification System for Supabase
  async function notifyError(error) {
    // Assuming you have a supabase client initialized
    const { data, error: sendError } = await supabase
      .from('error_notifications')
      .insert([{ message: error.message }]);

    if (sendError) {
      console.error('Error sending notification:', sendError);
      alert('An error occurred. Please try again later.');
    } else {
      console.log('Error notification sent:', data);
    }
  }

  // Example usage
  try {
    // Some Supabase operation
    const { data, error } = await supabase.from('example_table').select();
    if (error) throw error;
  } catch (error) {
    await notifyError(error);
  }
</script>
